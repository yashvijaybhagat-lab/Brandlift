<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="120" rx="16" fill="#0A0A0B"/>

  <!-- Subtle indigo glow behind icon -->
  <ellipse cx="58" cy="60" rx="48" ry="48" fill="#6366f1" opacity="0.08" filter="url(#glow)"/>

  <!-- Icon: rounded square with gradient -->
  <rect x="8" y="10" width="100" height="100" rx="22" fill="url(#iconGrad)"/>

  <!-- Play triangle -->
  <path d="M42 38 L42 82 L80 60 Z" fill="white" opacity="0.95"/>

  <!-- Lift arrow -->
  <path d="M68 28 L75 20 L82 28" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  <line x1="75" y1="20" x2="75" y2="34" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="126" y="72" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="700" letter-spacing="-2" fill="#FAFAFA">Brand</text>
  <text x="245" y="72" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="700" letter-spacing="-2" fill="url(#iconGrad)">Lift</text>
</svg>
